<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - PhD Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .form-section {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }

        .btn-secondary {
            background: #3498db;
        }

        .btn-secondary:hover {
            background: #2980b9;
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        a {
            color: #2196F3;
            text-decoration: none;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .otp-section {
            display: none;
            border-top: 2px solid #eee;
            margin-top: 20px;
            padding-top: 20px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Register for PhD Portal</h1>
        <p>Create your account</p>
    </div>

    <div class="form-section">
        <div id="alert" class="alert"></div>

        <!-- Step 1: Registration Form -->
        <div id="step1">
            <form id="registerForm">
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label>Role *</label>
                    <select id="role" name="role" required>
                        <option value="">Select Role</option>
                        <option value="DOCTORANT">PhD Student (Doctorant)</option>
                        <option value="DIRECTOR">Thesis Director</option>
                        <option value="ADMIN">Administrator</option>
                    </select>
                </div>

                <button type="submit" id="sendOtpBtn">Send Verification Code</button>
            </form>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step2" class="otp-section">
            <h3>Email Verification</h3>
            <p>Please enter the 6-digit code sent to <span id="userEmail"></span></p>

            <div class="form-group">
                <label>OTP Code *</label>
                <input type="text" id="otp" name="otp" maxlength="6" placeholder="123456">
            </div>

            <button id="verifyOtpBtn" class="btn-secondary">Verify & Complete Registration</button>
            <button id="resendOtpBtn" style="background: #95a5a6; margin-top: 10px;">Resend Code</button>
        </div>

        <div class="link">
            <a href="/login">Already have an account? Login here</a>
        </div>
    </div>
</div>

<script>
    let registeredEmail = '';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;
        const role = document.getElementById('role').value;

        if (!email || !password || !fullName || !role) {
            showAlert('Please fill all fields', 'error');
            return;
        }

        showLoading('sendOtpBtn', true);

        try {
            const formData = new URLSearchParams();
            formData.append('email', email);
            formData.append('password', password);
            formData.append('fullName', fullName);
            formData.append('role', role);

            const response = await fetch('/register/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const result = await response.json();

            if (result.status === 'success') {
                registeredEmail = email;
                document.getElementById('userEmail').textContent = email;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                showAlert(result.message, 'success');
            } else {
                showAlert(result.message, 'error');
            }
        } catch (err) {
            showAlert('Error sending OTP', 'error');
        } finally {
            showLoading('sendOtpBtn', false);
        }
    });

    document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
        const otp = document.getElementById('otp').value;

        if (!otp || otp.length !== 6) {
            showAlert('Please enter 6-digit OTP', 'error');
            return;
        }

        showLoading('verifyOtpBtn', true);

        try {
            const formData = new URLSearchParams();
            formData.append('email', registeredEmail);
            formData.append('otp', otp);

            const response = await fetch('/register/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const result = await response.json();

            if (result.status === 'success') {
                showAlert(result.message, 'success');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                showAlert(result.message, 'error');
            }
        } catch (err) {
            showAlert('Error verifying OTP', 'error');
        } finally {
            showLoading('verifyOtpBtn', false);
        }
    });

    document.getElementById('resendOtpBtn').addEventListener('click', async () => {
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;
        const role = document.getElementById('role').value;

        showLoading('resendOtpBtn', true);

        try {
            const formData = new URLSearchParams();
            formData.append('email', registeredEmail);
            formData.append('password', password);
            formData.append('fullName', fullName);
            formData.append('role', role);

            const response = await fetch('/register/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const result = await response.json();

            if (result.status === 'success') {
                showAlert('New OTP sent to your email', 'success');
            } else {
                showAlert(result.message, 'error');
            }
        } catch (err) {
            showAlert('Error resending OTP', 'error');
        } finally {
            showLoading('resendOtpBtn', false);
        }
    });

    function showAlert(message, type) {
        const alertDiv = document.getElementById('alert');
        alertDiv.textContent = message;
        alertDiv.className = 'alert alert-' + type;
        alertDiv.style.display = 'block';

        setTimeout(() => {
            alertDiv.style.display = 'none';
        }, 5000);
    }

    function showLoading(buttonId, isLoading) {
        const btn = document.getElementById(buttonId);
        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Processing...';
        } else {
            btn.disabled = false;
            btn.innerHTML = btn.id === 'sendOtpBtn' ? 'Send Verification Code' :
                (btn.id === 'verifyOtpBtn' ? 'Verify & Complete Registration' : 'Resend Code');
        }
    }
</script>
</body>
</html>
