<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #fff7ed;
            color: #1f2937;
            padding: 24px;
        }
        .box {
            width: min(680px, 100%);
            background: #ffffff;
            border: 1px solid #fed7aa;
            border-radius: 10px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 44px;
        }
        p {
            margin: 8px 0;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            background: #ea580c;
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>404</h1>
    <p><strong>Page not found.</strong></p>
    <p>We looked everywhere. Even in the folder named "final_final_v2_real".</p>
    <p>This page does not exist.</p>
    <a class="btn" th:href="@{/}" href="/">Back To Home</a>
</div>
</body>
</html>
