<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Campaign - Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .navbar {
      background: #2c3e50;
      overflow: hidden;
      padding: 15px 20px;
      margin-bottom: 30px;
      border-radius: 10px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
      display: inline-block;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .form-section {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      background: #27ae60;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
    }

    button:hover {
      background: #229954;
    }

    .btn-back {
      background: #95a5a6;
      margin-top: 10px;
    }

    .btn-back:hover {
      background: #7f8c8d;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>
<div class="navbar">
  <a href="/dashboard">Dashboard</a>
  <a href="/admin/campaigns">Campaigns</a>
  <a href="/">Home</a>
  <a href="/logout" style="float: right;">Logout</a>
</div>

<div class="container">
  <div class="header">
    <h1>Edit Campaign</h1>
    <p th:text="'Campaign #' + ${campaign.id}">Campaign ID</p>
  </div>

  <div class="form-section">
    <form method="post">
      <div class="form-group">
        <label>Campaign Name *</label>
        <input type="text" name="name" th:value="${campaign.name}" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description" th:text="${campaign.description}"></textarea>
      </div>

      <div class="form-group">
        <label>Start Date & Time *</label>
        <input type="datetime-local" name="startDate"
               th:value="${#temporals.format(campaign.startDate, 'yyyy-MM-dd\'T\'HH:mm')}" required>
      </div>

      <div class="form-group">
        <label>End Date & Time *</label>
        <input type="datetime-local" name="endDate"
               th:value="${#temporals.format(campaign.endDate, 'yyyy-MM-dd\'T\'HH:mm')}" required>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="UPCOMING" th:selected="${campaign.status == 'UPCOMING'}">Upcoming</option>
          <option value="ACTIVE" th:selected="${campaign.status == 'ACTIVE'}">Active</option>
          <option value="CLOSED" th:selected="${campaign.status == 'CLOSED'}">Closed</option>
        </select>
        <div class="info-text">Manually override campaign status</div>
      </div>

      <div class="form-group">
        <label>Maximum Applications</label>
        <input type="number" name="maxApplications" th:value="${campaign.maxApplications}" min="1">
        <div class="info-text">Leave empty for unlimited</div>
      </div>

      <button type="submit">Update Campaign</button>
      <a href="/admin/campaigns" class="btn-back" style="display: block; text-align: center; text-decoration: none;">Cancel</a>
    </form>
  </div>
</div>
</body>
</html>
