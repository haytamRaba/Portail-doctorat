<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Create Campaign - Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .navbar {
      background: #2c3e50;
      overflow: hidden;
      padding: 15px 20px;
      margin-bottom: 30px;
      border-radius: 10px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
      display: inline-block;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .form-section {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      background: #27ae60;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
    }

    button:hover {
      background: #229954;
    }

    .btn-back {
      background: #95a5a6;
      margin-top: 10px;
    }

    .btn-back:hover {
      background: #7f8c8d;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .datetime-input {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
  </style>
</head>
<body>
<div class="navbar">
  <a href="/dashboard">Dashboard</a>
  <a href="/admin/campaigns">Campaigns</a>
  <a href="/">Home</a>
  <a href="/logout" style="float: right;">Logout</a>
</div>

<div class="container">
  <div class="header">
    <h1>Create New Registration Campaign</h1>
    <p>Define when doctorants can submit PhD applications</p>
  </div>

  <div class="form-section">
    <form method="post">
      <div class="form-group">
        <label>Campaign Name *</label>
        <input type="text" name="name" required
               placeholder="e.g., 2026-2027 PhD Registration">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description"
                  placeholder="Optional: Additional details about this campaign"></textarea>
      </div>

      <div class="form-group">
        <label>Start Date & Time *</label>
        <input type="datetime-local" name="startDate" required>
        <div class="info-text">When doctorants can start submitting applications</div>
      </div>

      <div class="form-group">
        <label>End Date & Time *</label>
        <input type="datetime-local" name="endDate" required>
        <div class="info-text">Deadline for submissions</div>
      </div>

      <div class="form-group">
        <label>Maximum Applications (Optional)</label>
        <input type="number" name="maxApplications" min="1" placeholder="Leave empty for unlimited">
        <div class="info-text">Limit the total number of applications</div>
      </div>

      <button type="submit">Create Campaign</button>
      <a href="/admin/campaigns" class="btn-back" style="display: block; text-align: center; text-decoration: none;">Cancel</a>
    </form>
  </div>
</div>
</body>
</html>
