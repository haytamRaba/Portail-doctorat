<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PhD Registration Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .form-section {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
        }

        button {
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        button:hover {
            background: #2980b9;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .navbar {
            background: #2c3e50;
            overflow: hidden;
            padding: 10px 20px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: inline-block;
        }

        .navbar a:hover {
            background: #34495e;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="navbar">
    <a href="/dashboard">Dashboard</a>
    <a href="/doctorant/register-phd">New Application</a>
    <a href="/">Home</a>
</div>

<div class="container">
    <div class="header">
        <h1>PhD Registration Application</h1>
        <p>Submit your thesis proposal and documents</p>
    </div>

    <div class="form-section">
        <form method="post" enctype="multipart/form-data">
            <!-- Thesis Information -->
            <div class="form-group">
                <label>Thesis Subject *</label>
                <input type="text" name="thesisSubject" required
                       placeholder="Enter your thesis title/subject">
            </div>

            <div class="form-group">
                <label>Research Domain *</label>
                <select name="researchDomain" required>
                    <option value="">Select domain</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Economics">Economics</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <!-- Director Information -->
            <div class="form-group">
                <label>Thesis Director Name *</label>
                <input type="text" name="directorName" required
                       placeholder="Full name of your thesis director">
            </div>

            <div class="form-group">
                <label>Co-Director Name (Optional)</label>
                <input type="text" name="coDirectorName"
                       placeholder="If applicable">
            </div>

            <!-- File Uploads -->
            <div class="form-group">
                <label>Diploma/Certificate *</label>
                <input type="file" name="diplomaFile" accept=".pdf,.jpg,.png" required>
                <div class="info-text">Upload your master's degree diploma (PDF, JPG, PNG - max 10MB)</div>
            </div>

            <div class="form-group">
                <label>Curriculum Vitae (CV) *</label>
                <input type="file" name="cvFile" accept=".pdf" required>
                <div class="info-text">Upload your CV (PDF format - max 10MB)</div>
            </div>

            <div class="form-group">
                <label>Additional Documents (Optional)</label>
                <input type="file" name="additionalFile" accept=".pdf,.zip">
                <div class="info-text">Research proposals, publications, or other supporting documents</div>
            </div>

            <button type="submit">Submit Application</button>
        </form>
    </div>
</div>
</body>
</html>
